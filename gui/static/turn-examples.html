<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/style.css">
    <title>Turn Examples</title>
</head>
<body>
<main class="example-page">
    <header class="page-header">
        <div class="page-title-block">
            <h1>Turn examples</h1>
            <p class="subtitle">Images for the clockwise Skewb turns, where the grey face is the front face. The red face is the left face, and the green face is the top face.</p>
            <a class="back-link" href="/">← Back to solver</a>
        </div>
    </header>

    <section class="example-grid" aria-label="Clockwise turn examples">
        <article class="card example-card">
            <h2>R clockwise</h2>
            <img src="/turn-examples/r-clockwise.png" alt="R clockwise turn">
        </article>

        <article class="card example-card">
            <h2>L clockwise</h2>
            <img src="/turn-examples/l-clockwise.png" alt="L clockwise turn">
        </article>

        <article class="card example-card">
            <h2>D clockwise</h2>
            <img src="/turn-examples/d-clockwise.png" alt="D clockwise turn">
        </article>

        <article class="card example-card">
            <h2>B clockwise</h2>
            <img src="/turn-examples/b-clockwise.png" alt="B clockwise turn">
        </article>
    </section>
</main>
</body>
</html>
